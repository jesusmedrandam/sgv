<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGV - Iniciar Sesión</title>
    <!-- Tailwind CSS para un diseño moderno rápido -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        <!-- Encabezado / Logo -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">SGV Ganadería</h1>
            <p class="text-slate-500 mt-2 text-sm">Ingresa tus credenciales para acceder al sistema</p>
        </div>

        <!-- Contenedor de Alertas de Error -->
        <div id="error-alert" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm"></div>

        <!-- Formulario -->
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Usuario</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all text-sm"
                    placeholder="ej: admin_ganaderia">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Contraseña</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all text-sm"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="btn-submit"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 rounded-lg shadow-lg hover:shadow-emerald-200 transition-all cursor-pointer text-sm flex justify-center items-center">
                <span>Ingresar al Sistema</span>
            </button>
        </form>
    </div>

    <script>
        // REEMPLAZA ESTA URL POR TU URL REAL DE RENDER
        const API_URL = 'https://sgv-zs3m.onrender.com';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorAlert = document.getElementById('error-alert');
            const btnSubmit = document.getElementById('btn-submit');

            // Limpiar alertas previas
            errorAlert.classList.add('hidden');
            btnSubmit.disabled = true;
            btnSubmit.innerText = 'Verificando...';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Ocurrió un error al iniciar sesión.');
                }

                // Guardar sesión de forma segura en el navegador
                localStorage.setItem('sgv_token', data.token);
                localStorage.setItem('sgv_user', JSON.stringify(data.usuario));

                // Redirigir al Dashboard
                window.location.href = 'dashboard.html';

            } catch (err) {
                errorAlert.innerText = err.message;
                errorAlert.classList.remove('hidden');
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'Ingresar al Sistema';
            }
        });
    </script>
</body>
</html>
