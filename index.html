<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGV - Iniciar Sesión</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-emerald-50 text-emerald-600 rounded-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-color="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">SGV Ganadería</h1>
            <p class="text-slate-500 mt-1 text-sm">Ingresa tus credenciales para acceder</p>
        </div>

        <div id="error-alert" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm"></div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Usuario</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-sm"
                    placeholder="ej: admin_ganaderia">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Contraseña</label>
                <div class="relative">
                    <input type="password" id="password" required 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-sm"
                        placeholder="••••••••">
                    <button type="button" id="btn-toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 cursor-pointer text-xs font-medium">
                        Mostrar
                    </button>
                </div>
            </div>

            <button type="submit" id="btn-submit"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg shadow-md transition-all cursor-pointer text-sm flex justify-center items-center">
                <span>Ingresar al Sistema</span>
            </button>
        </form>
    </div>

    <script>
        const API_URL = '/api';

        // Lógica del botón Mostrar/Ocultar Contraseña
        document.getElementById('btn-toggle-password').addEventListener('click', function() {
            const passInput = document.getElementById('password');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                this.innerText = 'Ocultar';
            } else {
                passInput.type = 'password';
                this.innerText = 'Mostrar';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorAlert = document.getElementById('error-alert');
            const btnSubmit = document.getElementById('btn-submit');

            errorAlert.classList.add('hidden');
            btnSubmit.disabled = true;
            btnSubmit.innerText = 'Verificando...';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Error al iniciar sesión.');

                localStorage.setItem('sgv_token', data.token);
                localStorage.setItem('sgv_user', JSON.stringify(data.usuario));
                window.location.href = 'dashboard.html';

            } catch (err) {
                errorAlert.innerText = err.message;
                errorAlert.classList.remove('hidden');
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'Ingresar al Sistema';
            }
        });
    </script>
</body>
</html>
